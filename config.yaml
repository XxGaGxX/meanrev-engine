# Mean Reversion Intraday — Configuration
# Centralized parameters for the entire strategy pipeline

# ───────────────────────────────────────────────
# ASSET UNIVERSE
# ───────────────────────────────────────────────
universe:
  symbols:
    - SPY
    - QQQ
    - IWM
  asset_class: us_equity

# ───────────────────────────────────────────────
# TIMEFRAME
# ───────────────────────────────────────────────
timeframe:
  primary: "15Min"      # Primary timeframe for signals
  secondary: "5Min"     # Optional secondary timeframe for comparison
  market_open: "09:30"  # US market open (EST)
  market_close: "16:00" # US market close (EST)
  skip_first_minutes: 30  # Skip first N minutes after open
  skip_last_minutes: 30   # Skip last N minutes before close

# ───────────────────────────────────────────────
# DATA FETCH
# ───────────────────────────────────────────────
data:
  historical_start: "2022-01-01"
  historical_end: null             # null = fetch up to yesterday
  feed: alpaca
  paper_trading: true

# ───────────────────────────────────────────────
# INDICATORS
# ───────────────────────────────────────────────
indicators:
  adx:
    period: 14
  hurst:
    window: 252        # Slow Hurst (structural regime, ~9 days at 15-min)
    fast_window: 50    # Fast Hurst (intraday micro, ~2 days) — used for regime filter
    min_lag: 2
    max_lag: 100
  rsi:
    period: 14
    oversold: 30
    overbought: 70
  bollinger:
    period: 20
    std_dev: 2
  zscore:
    window: 20
  volume:
    window: 20
    multiplier: 1.5
  atr:
    period: 14

# ───────────────────────────────────────────────
# REGIME FILTER (Level 1)
# ───────────────────────────────────────────────
regime_filter:
  adx_threshold: 25
  hurst_threshold: 0.55
  use_fast_hurst: true             # Use fast Hurst (window=50) for entry gate
  soft_scoring: true               # Weighted scoring instead of binary AND
  score_adx_weight: 0.40           # Weight for ADX component
  score_hurst_weight: 0.40         # Weight for Hurst component
  score_atr_weight: 0.20           # Weight for ATR component
  score_threshold: 0.50            # Min aggregated score for regime_ok
  adaptive_hurst: true             # Per-bar Hurst threshold via slow Hurst
  adaptive_strong_trend_h: 0.60    # Slow Hurst > this -> tighten
  adaptive_tight_threshold: 0.45   # Tight threshold (more selective)
  adaptive_range_h: 0.50           # Slow Hurst < this -> relax
  adaptive_relax_threshold: 0.55   # Relaxed threshold (more permissive)
  atr_relative_std_threshold: 2.0  # Exclude if ATR% > 2 std from mean
  min_regime_coverage_pct: 10      # Min % of time regime_ok=True
  max_regime_coverage_pct: 70      # Max % of time regime_ok=True

# ───────────────────────────────────────────────
# ENTRY SIGNAL (Level 2)
# ───────────────────────────────────────────────
entry_signal:
  z_threshold: 2.0
  use_volume_confirm: true
  use_price_action: false          # Optional: pin bar / hammer confirmation
  min_signals_per_asset: 30        # Min signals for statistical validity
  # ── Soft scoring (Sprint 4) ──────────────────────────────
  soft_scoring: false
  entry_score_threshold: 0.50
  score_regime_weight: 0.30        # regime_ok: 30%
  score_rsi_weight: 0.15           # RSI extreme: 15%
  score_bb_weight: 0.15            # BB band touch: 15%
  score_z_weight: 0.25             # z-score extreme: 25%
  score_vol_weight: 0.15           # volume confirm: 15%

# ───────────────────────────────────────────────
# EXIT MANAGEMENT (Level 3)
# ───────────────────────────────────────────────
exit:
  atr_multiplier: 1.5
  max_bars: 12                     # Time stop after N bars
  adx_stop_threshold: 25           # Regime stop if ADX crosses above

# ───────────────────────────────────────────────
# ACCOUNT
# ───────────────────────────────────────────────
account:
  equity: 10000                    # Starting equity for backtest / paper / live

# ───────────────────────────────────────────────
# RISK MANAGEMENT
# ───────────────────────────────────────────────
risk:
  risk_per_trade_pct: 1.0          # Risk per trade (1%)
  max_risk_per_trade_pct: 2.0      # Hard cap
  max_open_positions: 3            # Max simultaneous positions
  kelly_fraction: 0.25             # 1/4 Kelly for scaling

# ───────────────────────────────────────────────
# BACKTEST
# ───────────────────────────────────────────────
backtest:
  commission_per_side: 0.0        # Alpaca: $0 commission on US equities
  slippage_pct: 0.0005            # 0.05% slippage (conservative estimate)

# ───────────────────────────────────────────────
# ENGINE — STRATEGY ROUTER
# ───────────────────────────────────────────────
engine:
  strategy_type: "mean_reversion"  # mean_reversion | momentum

# ───────────────────────────────────────────────
# MOMENTUM ENTRY (used when engine.strategy_type=momentum)
# All momentum-related config in one block: entry signals and
# the exit overrides that distinguish momentum from mean-reversion.
# ───────────────────────────────────────────────
momentum_entry:
  breakout_lookback: 20      # N-bar Donchian channel for high/low breakout
  adx_min: 25.0              # ADX threshold (trending regime)
  use_volume_confirm: true   # Require vol_confirm=True at trigger bar
  direction_mode: long_only  # long_only | both
  # Exit overrides applied under strategy_type=momentum (compose into
  # the exit block at engine level):
  atr_multiplier: 2.0        # SL distance (wider vs MR's 1.5)
  max_bars: 25               # Time stop (longer than MR's 12)
  adx_stop_threshold: 20.0   # Regime stop (lower than MR's 25; momentum dies)
  tp_mode: none              # zscore | atr_target | none
  tp_atr_target: 4.0         # Target ATR (used only if tp_mode=atr_target)

# ───────────────────────────────────────────────
# WALK-FORWARD ANALYSIS
# ───────────────────────────────────────────────
walk_forward:
  train_months: 6
  test_months: 1
  min_windows: 4
  oos_degradation_tolerance: 0.20   # Metrics can degrade max 20%

# ───────────────────────────────────────────────
# MONTE CARLO
# ───────────────────────────────────────────────
monte_carlo:
  n_simulations: 10000
  confidence_levels: [5, 50, 95]

# ───────────────────────────────────────────────
# PAPER / LIVE TRADING
# ───────────────────────────────────────────────
live:
  paper_duration_weeks: 6
  min_paper_trades: 50
  live_size_reduction: 0.50       # Trade at 50% size for first weeks
  live_scaling_weeks: 4
  weekly_metric_review: true
